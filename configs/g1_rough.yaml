# Unitree G1 험지(rough terrain) 보행 — MuJoCo Playground + brax PPO
# jax-rocm 0.9.2+ 에서 gfx1201 버그가 해결되어 풀파워(DR on, 대량 envs, SimBa) 사용.
#
# 학습:
#   .venv-mjx/bin/python train.py --config configs/g1_rough.yaml
# 이어학습:
#   .venv-mjx/bin/python train.py --config configs/g1_rough.yaml restore_path=pipeline_g1_rough.pkl
env: G1JoystickRoughTerrain
backend: playground
seed: 0
model_path: models/pipeline_g1_simba.pkl   # 학습된 정책 저장 위치 (폴더 자동 생성)
restore_path: ""
rocm_strip_force_sensors: false   # 0.9.2+에서는 불필요 (전체 보상항 사용)
naconmax: 8192                     # 대량 envs 메모리 절약 (G1 feetonly엔 충분)

ppo:
  num_timesteps: 150_000_000
  num_envs: 1024                   # SimBa+gfx1201 검증 규모 (2048+는 불안정)
  num_evals: 50                    # 평가/체크포인트 빈도: 약 3M 스텝마다 (중간 저장 자주)
  num_eval_envs: 128
  learning_rate: 3e-4
  entropy_cost: 5e-3
  discounting: 0.97
  unroll_length: 20
  batch_size: 256
  num_minibatches: 4
  num_updates_per_batch: 4
  num_resets_per_eval: 1
  reward_scaling: 1.0
  clipping_epsilon: 0.2
  max_grad_norm: 1.0
  gae_lambda: 0.95
  episode_length: 1000
  normalize_observations: true
  precision: float32
  deterministic_eval: true
  # 비대칭 actor-critic
  policy_obs_key: state
  value_obs_key: privileged_state
  # 주의: SimBa + 도메인랜덤화 동시 사용은 gfx1201 코드젠 버그로 abort(메모리 줄여도 동일).
  # SimBa 우선 → DR off. (DR이 꼭 필요하면 network=mlp 로 전환)
  domain_randomization: false
  # 신경망: SimBa (residual+LayerNorm, MLP보다 우수)
  network: simba
  simba_policy_blocks: 2
  simba_policy_hidden: 256
  simba_value_blocks: 2
  simba_value_hidden: 512
  # (network=mlp 일 때만 사용되는 폴백 크기)
  policy_hidden_layer_sizes: "512,256,128"
  value_hidden_layer_sizes: "512,256,128"
