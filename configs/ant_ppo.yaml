# ant + MJX PPO м„Өм •
# CLIлЎң мҳӨлІ„лқјмқҙл“ң: env=halfcheetah ppo.num_envs=1024
env: ant
backend: mjx
seed: 0
model_path: pipeline_ant.pkl

ppo:
  num_timesteps: 60_000_000
  num_envs: 2048
  num_evals: 20
  num_eval_envs: 128
  learning_rate: 3e-4
  entropy_cost: 1e-2
  discounting: 0.99
  unroll_length: 20
  batch_size: 1024
  num_minibatches: 32
  num_updates_per_batch: 4
  reward_scaling: 0.1
  episode_length: 1000
  normalize_observations: true
  precision: bfloat16
  deterministic_eval: true
